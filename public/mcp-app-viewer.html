<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ACC Model Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html, body {
        margin: 0;
        background: #1a1a1a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
      }
      /* Give the 3D viewer a fixed canvas height inside the chat card. */
      #root { width: 100%; height: 600px; position: relative; }
      #frame { width: 100%; height: 100%; border: 0; display: none; }
      #status { color: #eee; padding: 24px; font-size: 14px; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="status">Waiting for model…</div>
      <!--
        The Autodesk Viewer needs Web Workers, WASM and WebGL, which the
        MCP-app sandbox CSP cannot grant (it only allows adding domains, not
        `worker-src blob:` / `'wasm-unsafe-eval'`). So we DON'T run the viewer
        here. Instead we embed the hosted /viewer page from our own origin —
        it ships with its own permissive CSP and runs the viewer normally.
        `frameDomains` in the resource CSP authorizes this nested iframe.
      -->
      <iframe id="frame" allow="fullscreen; xr-spatial-tracking"></iframe>
    </div>

    <script type="module">
      const statusEl = document.getElementById('status');
      const frameEl = document.getElementById('frame');

      function setStatus(text) {
        statusEl.textContent = text;
        statusEl.style.display = 'block';
        frameEl.style.display = 'none';
      }

      function openViewer(url) {
        frameEl.src = url;
        statusEl.style.display = 'none';
        frameEl.style.display = 'block';
      }

      async function main() {
        const { App } = await import('https://esm.sh/@modelcontextprotocol/ext-apps@1.7.4');
        const app = new App({ name: 'ACC Model Viewer', version: '1.0.0' }, {});

        // Registered before connect() — the host delivers the originating
        // tool's result once, shortly after the ui/initialize handshake.
        app.ontoolresult = (result) => {
          const url = result?.structuredContent?.viewerUrl ?? result?._meta?.viewerUrl;
          if (url) openViewer(String(url));
          else setStatus('The server did not return a viewer URL. Try requesting the model again.');
        };

        await app.connect();
      }

      main().catch((err) => setStatus(err.message || String(err)));
    </script>
  </body>
</html>
